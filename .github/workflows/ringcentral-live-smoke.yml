name: RingCentral Live Smoke

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      record_count:
        description: "Recent message count to inspect"
        required: false
        default: "50"
      cleanup:
        description: "Delete test messages after verification"
        required: false
        type: boolean
        default: false
      ws_timeout_ms:
        description: "Timeout for bot WebSocket connect/receive checks"
        required: false
        default: "30000"
      file_upload:
        description: "Run file/image upload attachment smoke"
        required: false
        type: boolean
        default: true
      thread_followup:
        description: "Run optional threaded follow-up smoke"
        required: false
        type: boolean
        default: false

jobs:
  ringcentral-live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ringcentral-live
    permissions:
      contents: read
    env:
      RC_E2E_ENABLED: "true"
      RC_SERVER_URL: ${{ secrets.RC_SERVER_URL || 'https://platform.ringcentral.com' }}
      RC_E2E_CHAT_ID: ${{ secrets.RC_E2E_CHAT_ID }}
      RC_E2E_RECORD_COUNT: ${{ inputs.record_count || '50' }}
      RC_E2E_CLEANUP: ${{ github.event_name == 'workflow_dispatch' && inputs.cleanup == true && 'true' || 'false' }}
      RC_E2E_WS_TIMEOUT_MS: ${{ inputs.ws_timeout_ms || '30000' }}
      RC_E2E_FILE_UPLOAD: ${{ github.event_name == 'workflow_dispatch' && inputs.file_upload == false && 'false' || 'true' }}
      RC_E2E_THREAD_FOLLOWUP: ${{ github.event_name == 'workflow_dispatch' && inputs.thread_followup == true && 'true' || 'false' }}
      RC_E2E_SOURCE_URL: ${{ github.event.pull_request.html_url || format('{0}/{1}/commit/{2}', github.server_url, github.repository, github.sha) }}
      RC_E2E_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      RC_BOT_TOKEN: ${{ secrets.RC_BOT_TOKEN }}
      RC_USER_CLIENT_ID: ${{ secrets.RC_USER_CLIENT_ID }}
      RC_USER_CLIENT_SECRET: ${{ secrets.RC_USER_CLIENT_SECRET }}
      RC_USER_JWT_TOKEN: ${{ secrets.RC_USER_JWT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run RingCentral live smoke
        run: pnpm test:live:ringcentral
