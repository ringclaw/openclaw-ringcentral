name: AI Code Validator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-code-validate:
    name: AI Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4


